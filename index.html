<!DOCTYPE html>
<html lang="az">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>12.07 ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    /* ─── RESET ─── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: pan-y;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ─── MESH BG ─── */
    #meshBg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 50%, #1e0b36 0%, transparent 68%),
        radial-gradient(ellipse 100% 80% at 25% 75%, #0d031a 0%, transparent 58%),
        radial-gradient(ellipse 80% 100% at 80% 15%, #150828 0%, transparent 52%),
        #030008;
      opacity: 0;
      transition: opacity 1.4s ease;
    }

    #meshBg.on {
      opacity: 1
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .15;
      animation: orbF 14s ease-in-out infinite
    }

    .orb:nth-child(1) {
      width: 50vw;
      height: 50vw;
      background: #3d0f6b;
      top: 8%;
      left: 2%;
      animation-duration: 16s
    }

    .orb:nth-child(2) {
      width: 38vw;
      height: 38vw;
      background: #6d0f4a;
      top: 52%;
      left: 58%;
      animation-duration: 12s;
      animation-delay: -5s
    }

    .orb:nth-child(3) {
      width: 28vw;
      height: 28vw;
      background: #200845;
      top: 28%;
      left: 38%;
      animation-duration: 18s;
      animation-delay: -8s
    }

    @keyframes orbF {

      0%,
      100% {
        transform: translate(0, 0) scale(1)
      }

      33% {
        transform: translate(2.5%, 6%) scale(1.07)
      }

      66% {
        transform: translate(-4%, -3%) scale(.94)
      }
    }

    /* ─── CANVASES ─── */
    #starCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.8s ease
    }

    #starCanvas.on {
      opacity: 1
    }

    #trailCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3
    }

    #vizCanvas {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: clamp(55px, 14vh, 100px);
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      transition: opacity 1.4s ease;
    }

    #vizCanvas.on {
      opacity: 1
    }

    /* ─── LIGHT LEAK ─── */
    #lightLeak {
      position: fixed;
      inset: 0;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 35%, rgba(255, 0, 127, .3) 0%, rgba(139, 0, 255, .18) 45%, transparent 78%);
    }

    /* ─── STAGE BASE ─── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }

    .stage.on {
      opacity: 1;
      pointer-events: all;
      z-index: 20
    }

    /* ════════════════════════════════════════
   PASSWORD STAGE
════════════════════════════════════════ */
    #sPw {
      background: #000;
      z-index: 300;
      opacity: 1;
      pointer-events: all
    }

    .pw-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(16px, 4vw, 28px);
      width: min(88vw, 400px);
    }

    .pw-lock {
      font-size: clamp(40px, 10vw, 62px);
      filter: drop-shadow(0 0 14px rgba(255, 0, 127, .45));
      animation: lockP 2.5s ease-in-out infinite;
    }

    @keyframes lockP {

      0%,
      100% {
        filter: drop-shadow(0 0 10px rgba(255, 0, 127, .28))
      }

      50% {
        filter: drop-shadow(0 0 24px rgba(255, 0, 127, .7))
      }
    }

    .pw-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(20px, 5vw, 34px);
      color: rgba(251, 207, 232, .82);
      text-align: center;
      line-height: 1.55;
      letter-spacing: .03em;
      text-shadow: 0 0 40px rgba(255, 0, 127, .22);
    }

    .pw-hint {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: clamp(9px, 2vw, 11px);
      letter-spacing: .44em;
      text-indent: .44em;
      color: rgba(251, 207, 232, .28);
      text-transform: uppercase;
      text-align: center;
    }

    .pw-input {
      width: 100%;
      background: rgba(255, 255, 255, .04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 0, 127, .2);
      border-radius: 14px;
      padding: 15px 22px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: clamp(18px, 5vw, 26px);
      letter-spacing: .38em;
      text-align: center;
      text-indent: .38em;
      color: #fafafa;
      outline: none;
      caret-color: #ff007f;
      transition: border-color .3s, box-shadow .3s;
    }

    .pw-input::placeholder {
      color: rgba(255, 255, 255, .18);
      letter-spacing: .15em;
      font-size: clamp(12px, 3vw, 16px)
    }

    .pw-input:focus {
      border-color: rgba(255, 0, 127, .55);
      box-shadow: 0 0 0 3px rgba(255, 0, 127, .11), 0 0 30px rgba(255, 0, 127, .1)
    }

    .pw-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, rgba(255, 0, 127, .16), rgba(236, 72, 153, .1));
      border: 1px solid rgba(255, 0, 127, .26);
      border-radius: 14px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: clamp(10px, 2.6vw, 13px);
      letter-spacing: .42em;
      text-indent: .42em;
      color: #fbcfe8;
      cursor: pointer;
      text-transform: uppercase;
      transition: background .25s, transform .12s, box-shadow .25s;
    }

    .pw-btn:hover {
      background: linear-gradient(135deg, rgba(255, 0, 127, .28), rgba(236, 72, 153, .18));
      box-shadow: 0 0 28px rgba(255, 0, 127, .18);
      transform: translateY(-1px)
    }

    .pw-btn:active {
      transform: scale(.97)
    }

    .pw-error {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: clamp(9px, 2.2vw, 12px);
      color: rgba(255, 90, 90, .8);
      letter-spacing: .1em;
      opacity: 0;
      text-align: center;
      min-height: 16px;
      transition: opacity .28s;
    }

    .pw-error.on {
      opacity: 1
    }

    /* ════════════════════════════════════════
   GATE  (Stage 0)
════════════════════════════════════════ */
    #s0 {
      background: #000;
      z-index: 100;
      cursor: pointer
    }

    .gate-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(28px, 6vw, 44px)
    }

    .gate-ring-wrap {
      position: relative;
      width: clamp(140px, 32vw, 200px);
      height: clamp(140px, 32vw, 200px)
    }

    .gate-ring-wrap svg {
      width: 100%;
      height: 100%;
      overflow: visible
    }

    .rtrack {
      fill: none;
      stroke: rgba(255, 0, 127, .09);
      stroke-width: 1.8
    }

    .rhalo {
      fill: none;
      stroke: rgba(255, 0, 127, .07);
      stroke-width: 9;
      filter: blur(7px);
      animation: haloSpin 6s linear infinite;
      transform-origin: 50% 50%
    }

    @keyframes haloSpin {
      to {
        transform: rotate(360deg)
      }
    }

    .rdraw {
      fill: none;
      stroke: url(#rg);
      stroke-width: 2.2;
      stroke-linecap: round;
      filter: drop-shadow(0 0 5px #ff007f) drop-shadow(0 0 14px rgba(255, 0, 127, .55));
      stroke-dasharray: 0;
      stroke-dashoffset: 0;
    }

    .gate-heart-center {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .gate-heart-emoji {
      font-size: clamp(40px, 10vw, 64px);
      filter: drop-shadow(0 0 10px #ff007f) drop-shadow(0 0 28px rgba(255, 0, 127, .75));
      animation: hbeat 1.5s ease-in-out infinite
    }

    @keyframes hbeat {

      0%,
      100% {
        transform: scale(1)
      }

      14% {
        transform: scale(1.15)
      }

      28% {
        transform: scale(1)
      }

      42% {
        transform: scale(1.09)
      }
    }

    .gate-label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: clamp(10px, 2.8vw, 15px);
      letter-spacing: .52em;
      color: rgba(251, 207, 232, .52);
      text-transform: uppercase;
      animation: breathe 2.2s ease-in-out infinite;
      text-indent: .52em
    }

    @keyframes breathe {

      0%,
      100% {
        opacity: .38
      }

      50% {
        opacity: .95
      }
    }

    /* ════════════════════════════════════════
   MATRIX  (Stage 1)
════════════════════════════════════════ */
    #s1 {
      background: transparent;
      z-index: 90
    }

    #matrixCanvas {
      position: absolute;
      inset: 0;
      opacity: .7
    }

    .cd-text {
      position: relative;
      z-index: 3;
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: clamp(70px, 20vw, 170px);
      color: #ff007f;
      text-shadow: 0 0 12px #ff007f, 0 0 32px #ff007f, 0 0 65px #ec4899, 0 0 110px rgba(255, 0, 127, .45);
      opacity: 0;
      letter-spacing: .04em;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
    }

    .cd-text.word {
      font-size: clamp(30px, 9vw, 78px);
      letter-spacing: .2em
    }

    /* ════════════════════════════════════════
   ENVELOPE  (Stage 2)
════════════════════════════════════════ */
    #s2 {
      z-index: 20
    }

    .env-wrap {
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center
    }

    .env-heart {
      font-size: clamp(28px, 7vw, 46px);
      filter: drop-shadow(0 0 8px #ff007f) drop-shadow(0 0 22px #ff007f);
      animation: hbeat 1.6s ease-in-out infinite;
      margin-bottom: -14px;
      z-index: 3;
      position: relative;
      transition: transform .2s
    }

    .env-heart:hover {
      transform: scale(1.2)
    }

    .env-svg-wrap {
      width: clamp(210px, 52vw, 330px);
      height: clamp(147px, 36vw, 231px);
      filter: drop-shadow(0 0 22px rgba(255, 0, 127, .42)) drop-shadow(0 0 65px rgba(255, 0, 127, .14)) drop-shadow(0 6px 44px rgba(0, 0, 0, .82));
      transition: transform .3s ease
    }

    .env-svg-wrap:hover {
      transform: translateY(-5px) scale(1.025)
    }

    .env-hint {
      margin-top: 26px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: clamp(9px, 2.2vw, 12px);
      letter-spacing: .42em;
      color: rgba(251, 207, 232, .42);
      text-transform: uppercase;
      animation: breathe 2s ease-in-out infinite;
      text-indent: .42em
    }

    /* ════════════════════════════════════════
   SLIDER  (Stage 3)
════════════════════════════════════════ */
    #s3 {
      z-index: 30;
      padding: 20px
    }

    .sl-card {
      position: relative;
      background: rgba(255, 255, 255, .028);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255, 105, 180, .14);
      border-radius: 26px;
      padding: clamp(30px, 7vw, 52px) clamp(26px, 6vw, 52px);
      width: min(92vw, 530px);
      box-shadow: 0 32px 90px rgba(0, 0, 0, .65), 0 0 0 .5px rgba(255, 255, 255, .035) inset, 0 1px 0 rgba(255, 255, 255, .06) inset;
      text-align: center;
      overflow: visible;
    }

    .sl-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .12), transparent);
      border-radius: 99px
    }

    .sl-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: clamp(15px, 4.2vw, 22px);
      color: #fbcfe8;
      letter-spacing: .05em;
      margin-bottom: clamp(24px, 5.5vw, 36px);
      line-height: 1.4
    }

    .sl-num {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: clamp(52px, 15vw, 96px);
      color: #ff007f;
      line-height: 1;
      margin-bottom: 4px;
      text-shadow: 0 0 22px rgba(255, 0, 127, .75), 0 0 55px rgba(255, 0, 127, .4), 0 0 95px rgba(236, 72, 153, .22);
      transition: text-shadow .3s
    }

    .sl-pct {
      font-size: .42em;
      vertical-align: super;
      opacity: .65
    }

    .sl-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(14px, 3.4vw, 20px);
      color: rgba(251, 207, 232, .68);
      min-height: 30px;
      margin-bottom: clamp(22px, 5vw, 30px);
      letter-spacing: .04em
    }

    .sl-track {
      position: relative;
      width: 100%;
      padding: 14px 0
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 2.5px;
      background: linear-gradient(to right, #ff007f var(--fill, 0%), rgba(255, 255, 255, .1) var(--fill, 0%));
      border-radius: 99px;
      outline: none;
      cursor: pointer;
      touch-action: none
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle at 34% 34%, #ff5ab0, #bb005e);
      box-shadow: 0 0 0 3px rgba(255, 0, 127, .22), 0 0 22px rgba(255, 0, 127, .9), 0 0 44px rgba(255, 0, 127, .45), 0 4px 14px rgba(0, 0, 0, .55);
      cursor: grab;
      touch-action: none;
      transition: box-shadow .18s, transform .1s
    }

    input[type=range]::-webkit-slider-thumb:active {
      cursor: grabbing;
      transform: scale(1.28);
      box-shadow: 0 0 0 5px rgba(255, 0, 127, .28), 0 0 34px rgba(255, 0, 127, 1), 0 0 66px rgba(255, 0, 127, .55)
    }

    input[type=range]::-moz-range-thumb {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 34% 34%, #ff5ab0, #bb005e);
      box-shadow: 0 0 22px rgba(255, 0, 127, .9);
      cursor: grab
    }

    #hCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border-radius: 26px
    }

    /* ════════════════════════════════════════
   SLIDES  (Stage 4)
════════════════════════════════════════ */
    #s4 {
      z-index: 40;
      padding: 28px
    }

    .slide-glass {
      position: relative;
      background: rgba(255, 255, 255, .018);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, .075);
      border-radius: 22px;
      padding: clamp(36px, 7.5vw, 60px) clamp(32px, 7vw, 60px);
      width: min(94vw, 760px);
      box-shadow: 0 44px 110px rgba(0, 0, 0, .68), 0 0 0 .5px rgba(255, 255, 255, .025) inset;
      text-align: center;
      overflow: hidden;
    }

    .slide-glass::after {
      content: '';
      position: absolute;
      top: 0;
      left: 8%;
      right: 8%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .09), transparent)
    }

    .slide-glass::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -15%;
      width: 55%;
      height: 160%;
      background: linear-gradient(130deg, transparent, rgba(255, 0, 127, .04), transparent);
      pointer-events: none;
      border-radius: 50%
    }

    .slide-inner {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(17px, 4.2vw, 31px);
      line-height: 1.85;
      color: #fafafa;
      letter-spacing: .03em;
      text-shadow: 0 0 50px rgba(255, 0, 127, .1), 0 2px 18px rgba(0, 0, 0, .5)
    }

    .ch {
      display: inline-block;
      opacity: 0;
      filter: blur(12px);
      transform: translateY(20px);
      will-change: opacity, filter, transform
    }

    /* ════════════════════════════════════════
   WORD HEART  (Stage 5)
════════════════════════════════════════ */
    #s5 {
      z-index: 50;
      overflow: hidden
    }

    #wcc {
      position: absolute;
      inset: 0;
      pointer-events: none
    }

    .cw {
      position: absolute;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      opacity: 0;
      white-space: nowrap;
      letter-spacing: .05em;
      will-change: transform, opacity;
      transform: translate(-50%, -50%)
    }

    .cw.center {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: #ff007f !important;
      animation: cPulse 1.65s ease-in-out infinite;
      z-index: 10
    }

    @keyframes cPulse {

      0%,
      100% {
        text-shadow: 0 0 12px #ff007f, 0 0 32px #ff007f, 0 0 75px rgba(255, 0, 127, .65), 0 0 130px rgba(255, 0, 127, .32)
      }

      50% {
        text-shadow: 0 0 22px #ff007f, 0 0 60px #ff007f, 0 0 120px rgba(255, 0, 127, .9), 0 0 200px rgba(255, 0, 127, .5)
      }
    }

    .center-orb {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255, 0, 127, .22) 0%, transparent 68%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 0
    }
  </style>
</head>

<body>

  <!-- MESH -->
  <div id="meshBg">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <!-- STARS -->
  <canvas id="starCanvas"></canvas>
  <!-- FLAME TRAIL -->
  <canvas id="trailCanvas"></canvas>
  <!-- MUSIC VISUALIZER -->
  <canvas id="vizCanvas"></canvas>
  <!-- LIGHT LEAK -->
  <div id="lightLeak"></div>

  <!-- ══ PASSWORD ══ -->
  <div class="stage" id="sPw">
    <div class="pw-wrap">
      <div class="pw-lock">🔐</div>
      <div class="pw-title">Bu kart yalnız bir nəfər üçündür…</div>
      <div class="pw-hint">Şifrəni daxil et</div>
      <input class="pw-input" id="pwInput" type="text" placeholder="· · · · ·" autocomplete="off" autocorrect="off"
        autocapitalize="none" spellcheck="false" maxlength="20" />
      <button class="pw-btn" id="pwBtn">Daxil Ol</button>
      <div class="pw-error" id="pwError">Yanlış şifrə. Yenidən cəhd et 💔</div>
      <div
        style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(12px,3vw,15px);color:rgba(251,207,232,.28);text-align:center;letter-spacing:.04em">
        İpucu: Mənim ən dəyərlim
      </div>
    </div>
  </div>

  <!-- ══ GATE ══ -->
  <div class="stage" id="s0">
    <div class="gate-center">
      <div class="gate-ring-wrap" id="gateRingWrap">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff007f" />
              <stop offset="50%" stop-color="#e879f9" />
              <stop offset="100%" stop-color="#ff007f" />
            </linearGradient>
          </defs>
          <circle class="rhalo" cx="50" cy="50" r="46" />
          <circle class="rtrack" cx="50" cy="50" r="43" />
          <circle class="rdraw" id="rdraw" cx="50" cy="50" r="43" transform="rotate(-90 50 50)" />
        </svg>
        <div class="gate-heart-center"><span class="gate-heart-emoji">❤️</span></div>
      </div>
      <div class="gate-label">Gülay Üçün… (Toxun)</div>
    </div>
  </div>

  <!-- ══ MATRIX ══ -->
  <div class="stage" id="s1">
    <canvas id="matrixCanvas"></canvas>
    <div class="cd-text" id="cdText"></div>
  </div>

  <!-- ══ ENVELOPE ══ -->

          <line x1="4" y1="220" x2="160" y2="138" stroke="rgba(200,150,180,.17)" stroke-width=".9" />
          <line x1="316" y1="220" x2="160" y2="138" stroke="rgba(200,150,180,.17)" stroke-width=".9" />
          <polygon points="4,40 316,40 160,134" fill="url(#efg)" filter="url(#eg)" />
          <rect x="4" y="40" width="312" height="180" rx="11" fill="none" stroke="rgba(255,0,127,.17)"
            stroke-width="1.4" />
          <circle cx="160" cy="128" r="17" fill="rgba(255,0,127,.055)" stroke="rgba(255,0,127,.19)" stroke-width=".9" />

  <!-- ══ SLIDER ══ -->
  <div class="stage" id="s3">

  <!-- ══ SLIDES ══ -->

    </div>

  <!-- ══ WORD HEART ══ -->
  <div class="stage" id="s5">
    <div id="wcc"></div>
  </div>

  <!-- AUDIO -->
  <audio id="t1" src="./music1.mp3" preload="auto"></audio>
  <audio id="t2" src="./music2.mp3" preload="auto" loop></audio>
  <audio id="sfxR" src="./paper-rustle.mp3" preload="auto"></audio>
  <audio id="sfxC" src="./magical-chime.mp3" preload="auto"></audio>

  <script>
    /* ══════════════════════════════════════════════════════════
       UTILS
    ══════════════════════════════════════════════════════════ */
    const clamp = (mn, v, mx) => Math.min(mx, Math.max(mn, v));
    const rnd = n => Math.random() * n;
    const rndPm = n => (Math.random() - 0.5) * n;

    /* ══════════════════════════════════════════════════════════
       HAPTIC  — navigator.vibrate wrapper (Android + some iOS)
    ══════════════════════════════════════════════════════════ */
    function haptic(pattern) {
      try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (_) { }
    }

    /* ══════════════════════════════════════════════════════════
       AUDIO  — pure HTMLAudioElement .volume, no Web Audio API.
       createMediaElementSource() was the root cause of silence:
       it hijacks the element output pipeline and breaks .volume.
       Fix: never call it. Control volume with .volume directly.
    ══════════════════════════════════════════════════════════ */
    const t1 = document.getElementById('t1');
    const t2 = document.getElementById('t2');
    const sfxR = document.getElementById('sfxR');
    const sfxC = document.getElementById('sfxC');

    t1.volume = 1;
    t2.volume = 0;
    sfxR.volume = 0.55;
    sfxC.volume = 0.68;

    // Track-2 custom loop: 124 s → 168 s
    t2.addEventListener('timeupdate', () => {
      if (t2.currentTime >= 168) t2.currentTime = 124;
    });

    function crossFade() {
      t2.currentTime = 124;
      t2.play().catch(() => { });
      const step = () => {
        t1.volume = Math.max(0, t1.volume - 0.032);
        t2.volume = Math.min(1, t2.volume + 0.032);
        if (t1.volume > 0 || t2.volume < 1) requestAnimationFrame(step);
        else { t1.pause(); t1.currentTime = 0; }
      };
      requestAnimationFrame(step);
    }

    // Kept as no-op so call-sites don't break
    function unlockAudio() { }

    /* ══════════════════════════════════════════════════════════
       GLOBAL POINTER  (gravity for stars + trail)
    ══════════════════════════════════════════════════════════ */
    const gPtr = { x: window.innerWidth / 2, y: window.innerHeight / 2, active: false };
    window.addEventListener('pointermove', e => { gPtr.x = e.clientX; gPtr.y = e.clientY; gPtr.active = true; }, { passive: true });
    window.addEventListener('pointerdown', e => { gPtr.x = e.clientX; gPtr.y = e.clientY; gPtr.active = true; unlockAudio(); }, { passive: true });
    window.addEventListener('pointerup', () => { gPtr.active = false; }, { passive: true });

    /* ══════════════════════════════════════════════════════════
       FLAME TRAIL CURSOR
       ── Neon pink/magenta radial-gradient particles
       ── FIX: single resize handler stored as const, never duplicated
    ══════════════════════════════════════════════════════════ */
    (function initTrail() {
      const cv = document.getElementById('trailCanvas');
      const ctx = cv.getContext('2d');
      let pts = [];
      let resizeTimer;

      const resize = () => { cv.width = window.innerWidth; cv.height = window.innerHeight; };
      resize();
      // Named + stored — won't accumulate duplicates
      const onResize = () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 100); };
      window.addEventListener('resize', onResize, { passive: true });

      window.addEventListener('pointermove', e => {
        const n = 4 + Math.floor(rnd(3));
        for (let i = 0; i < n; i++) {
          pts.push({
            x: e.clientX + rndPm(5),
            y: e.clientY + rndPm(5),
            vx: rndPm(1.1),
            vy: -(0.7 + rnd(2.0)),
            life: 1,
            decay: 0.028 + rnd(0.038),
            size: 3 + rnd(8),
            hue: 325 + rndPm(28),
          });
        }
      }, { passive: true });

      const loop = () => {
        ctx.clearRect(0, 0, cv.width, cv.height);
        pts = pts.filter(p => p.life > 0.01);
        pts.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy -= 0.055;   // upward "flame" buoyancy
          p.vx *= 0.96;
          p.life -= p.decay;
          p.size *= 0.975;
          const a = Math.max(0, p.life);
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
          g.addColorStop(0, `hsla(${p.hue},100%,92%,${a})`);
          g.addColorStop(0.4, `hsla(${p.hue},100%,62%,${a * 0.7})`);
          g.addColorStop(1, `hsla(${p.hue},100%,38%,0)`);
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
        });
        requestAnimationFrame(loop);
      };
      loop();
    })();

    /* ══════════════════════════════════════════════════════════
       MUSIC VISUALIZER  — CSS volume-pulse, no Web Audio API.
       Pulses the vizCanvas height based on t2.volume directly.
       This keeps the visual without touching the audio pipeline.
    ══════════════════════════════════════════════════════════ */
    function startVizDraw() {
      const cv = document.getElementById('vizCanvas');
      const ctx = cv.getContext('2d');

      let resizeTimer;
      const resize = () => { cv.width = window.innerWidth; cv.height = cv.offsetHeight || 80; };
      resize();
      const onResize = () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 100); };
      window.addEventListener('resize', onResize, { passive: true });

      cv.classList.add('on');

      // Simulate frequency bars by animating with time + volume
      let phase = 0;
      const BARS = 64;

      const draw = () => {
        ctx.clearRect(0, 0, cv.width, cv.height);
        const vol = t2.volume;          // 0-1, already correct
        if (vol < 0.01) { phase += 0.04; requestAnimationFrame(draw); return; }

        phase += 0.045;
        const barW = cv.width / BARS;

        for (let i = 0; i < BARS; i++) {
          // Each bar oscillates at a different frequency, scaled by t2.volume
          const wave = 0.45 + 0.55 * Math.abs(Math.sin(phase + i * 0.28 + Math.sin(i * 0.15 + phase * 0.7) * 1.2));
          const h = wave * vol * cv.height * 0.88;
          const x = i * barW;
          const hue = 318 + i * (48 / BARS);
          const alpha = 0.3 + 0.7 * vol * wave;

          const grad = ctx.createLinearGradient(0, cv.height, 0, cv.height - h);
          grad.addColorStop(0, `hsla(${hue},100%,52%,${alpha})`);
          grad.addColorStop(0.5, `hsla(${hue + 18},100%,68%,${alpha * 0.8})`);
          grad.addColorStop(1, `hsla(${hue + 38},100%,85%,0)`);

          ctx.fillStyle = grad;
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(x, cv.height - h, barW - 1.5, h, 2);
          else ctx.rect(x, cv.height - h, barW - 1.5, h);
          ctx.fill();
        }
        requestAnimationFrame(draw);
      };
      draw();
    }

    /* ══════════════════════════════════════════════════════════
       STAGE HELPERS
    ══════════════════════════════════════════════════════════ */
    function showStage(id, ms = 700) {
      return new Promise(r => {
        const el = document.getElementById(id);
        el.style.transition = `opacity ${ms}ms ease`;
        el.classList.add('on');
        requestAnimationFrame(() => requestAnimationFrame(() => {
          el.style.opacity = '1';
          setTimeout(r, ms);
        }));
      });
    }

    function hideStage(id, ms = 700) {
      return new Promise(r => {
        const el = document.getElementById(id);
        el.style.transition = `opacity ${ms}ms ease`;
        el.style.opacity = '0';
        setTimeout(() => { el.classList.remove('on'); el.style.pointerEvents = 'none'; r(); }, ms);
      });
    }

    /* ══════════════════════════════════════════════════════════
       PASSWORD STAGE
       !! Change CORRECT to your real answer !!
    ══════════════════════════════════════════════════════════ */
    (function initPassword() {
      const stage = document.getElementById('sPw');
      const input = document.getElementById('pwInput');
      const btn = document.getElementById('pwBtn');
      const errEl = document.getElementById('pwError');
      const CORRECT = 'Gülay';   // ← change this

      // Show password stage immediately on page load
      stage.classList.add('on');
      stage.style.opacity = '1';

      function attempt() {
        unlockAudio();
        haptic([10]);
        const val = input.value.trim();
        if (val === CORRECT) {
          errEl.classList.remove('on');
          haptic([15, 30, 15]);
          gsap.to(stage, { backgroundColor: 'rgba(255,0,127,0.05)', duration: 0.28, yoyo: true, repeat: 1 });
          hideStage('sPw', 650).then(initGate);
        } else {
          errEl.classList.add('on');
          haptic([80, 40, 80]);
          gsap.to(input, {
            x: -10, duration: 0.05, repeat: 5, yoyo: true, ease: 'none',
            onComplete: () => gsap.set(input, { x: 0 })
          });
          setTimeout(() => errEl.classList.remove('on'), 2800);
        }
      }

      btn.addEventListener('click', attempt);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
    })();

    /* ══════════════════════════════════════════════════════════
       GATE  (Stage 0)
       ── Ring draws itself with strokeDasharray CSS transition
          after stage fades in — reliable on all browsers
    ══════════════════════════════════════════════════════════ */
    function initGate() {
      showStage('s0', 600).then(() => {
        // Animate ring draw after stage is visible
        const circle = document.getElementById('rdraw');
        const circ = +(2 * Math.PI * 43).toFixed(2);
        // Set initial "hidden" state
        circle.style.strokeDasharray = circ + ' ' + circ;
        circle.style.strokeDashoffset = circ;
        circle.style.transition = 'stroke-dashoffset 2.6s cubic-bezier(.4,0,.2,1)';
        // Trigger draw on next tick
        requestAnimationFrame(() => requestAnimationFrame(() => {
          circle.style.strokeDashoffset = '0';
        }));
      });

      document.getElementById('s0').addEventListener('click', async () => {
        unlockAudio();
        haptic([10, 18, 10]);
        t1.play().catch(() => { });
        await hideStage('s0', 520);
        startStage1();
      }, { once: true });
    }

    /* ══════════════════════════════════════════════════════════
       STAGE 1  —  MATRIX COUNTDOWN
       ── FIX: matrixResize stored as const; removed via
          removeEventListener before stage ends → no leak
    ══════════════════════════════════════════════════════════ */
    function startStage1() {
      const s = document.getElementById('s1');
      s.style.transition = 'opacity 0ms';
      s.style.opacity = '1';
      s.classList.add('on');

      const cv = document.getElementById('matrixCanvas');
      const ctx = cv.getContext('2d');
      let raf;
      let drops = [];
      const fs = 13;
      const chars = 'アイウエオカキクケコサシスセソタチツテト0123456789ABCDEF❤♥';

      // Named resize handler — stored for later removal
      const matrixResize = () => {
        cv.width = window.innerWidth;
        cv.height = window.innerHeight;
        drops = Array.from({ length: Math.floor(cv.width / fs) }, () => rnd(-cv.height / fs));
      };
      matrixResize();
      window.addEventListener('resize', matrixResize, { passive: true });

      const draw = () => {
        ctx.fillStyle = 'rgba(0,0,0,.055)';
        ctx.fillRect(0, 0, cv.width, cv.height);
        ctx.fillStyle = '#ff007f';
        ctx.font = `${fs}px monospace`;
        const cols = Math.floor(cv.width / fs);
        while (drops.length < cols) drops.push(0);
        for (let i = 0; i < cols; i++) {
          ctx.globalAlpha = 0.46 + rnd(0.54);
          ctx.fillText(chars[Math.floor(rnd(chars.length))], i * fs, drops[i] * fs);
          ctx.globalAlpha = 1;
          if (drops[i] * fs > cv.height && Math.random() > 0.974) drops[i] = 0;
          drops[i]++;
        }
        raf = requestAnimationFrame(draw);
      };
      draw();

      // Countdown sequence
      const el = document.getElementById('cdText');
      const seq = [
        { t: '3' }, { t: '2' }, { t: '1' },
        { t: 'AD', w: 1 }, { t: 'GÜNÜN', w: 1 },
        { t: 'MÜBARƏK', w: 1 }, { t: 'GÜLAY', w: 1 },
        { t: '❤️', final: 1 },
      ];
      let idx = 0;
      gsap.set(el, { opacity: 0, scale: 0.86 });

      const next = () => {
        if (idx >= seq.length) return;
        const item = seq[idx++];
        el.textContent = item.t;
        el.className = 'cd-text' + (item.w ? ' word' : '');
        if (item.final) {
          el.style.fontSize = 'clamp(96px,27vw,215px)';
          el.style.textShadow = '0 0 18px #ff007f,0 0 55px #ff007f,0 0 110px #ff007f,0 0 190px rgba(255,0,127,.68),0 0 330px rgba(236,72,153,.46)';
        } else {
          el.style.fontSize = ''; el.style.textShadow = '';
        }
        haptic([5]);
        gsap.to(el, { opacity: 1, scale: 1, duration: 0.34, ease: 'power2.out' });
        gsap.to(el, {
          opacity: 0, scale: item.final ? 1.55 : 1.06,
          duration: item.final ? 1.25 : 0.34,
          delay: item.final ? 0.82 : 0.76,
          ease: 'power2.in',
          onComplete: () => {
            if (item.final) {
              // ── FIX: cancel RAF + remove listener cleanly ──
              cancelAnimationFrame(raf);
              window.removeEventListener('resize', matrixResize);
              hideStage('s1', 820).then(() => {
                cv.style.display = 'none';
                startStage2();
              });
            } else {
              next();
            }
          },
        });
      };
      setTimeout(next, 280);
    }

    /* ══════════════════════════════════════════════════════════
       GRAVITY STARS
       ── FIX: starResize stored as const — called once, never
          duplicated across calls. initStars() itself is only
          called once from startStage2().
    ══════════════════════════════════════════════════════════ */
    let _starsInited = false;

    function initStars() {
      if (_starsInited) return;
      _starsInited = true;

      const cv = document.getElementById('starCanvas');
      const ctx = cv.getContext('2d');
      let stars = [];

      const starResize = () => {
        cv.width = window.innerWidth;
        cv.height = window.innerHeight;
        stars = Array.from({ length: 320 }, () => {
          const ox = rnd(cv.width), oy = rnd(cv.height);
          return {
            ox, oy, x: ox, y: oy, r: 0.28 + rnd(1.35),
            phase: rnd(Math.PI * 2), speed: 0.003 + rnd(0.007), vx: 0, vy: 0
          };
        });
      };
      starResize();
      window.addEventListener('resize', starResize, { passive: true });

      const GRAV = 0.055, RETURN = 0.018, DAMP = 0.88, GRAD = 155;

      const loop = t => {
        ctx.clearRect(0, 0, cv.width, cv.height);
        stars.forEach(s => {
          if (gPtr.active) {
            const dx = gPtr.x - s.x, dy = gPtr.y - s.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < GRAD) {
              const f = GRAV * (1 - dist / GRAD);
              s.vx += dx * f * 0.05;
              s.vy += dy * f * 0.05;
            }
          }
          s.vx += (s.ox - s.x) * RETURN;
          s.vy += (s.oy - s.y) * RETURN;
          s.vx *= DAMP; s.vy *= DAMP;
          s.x += s.vx; s.y += s.vy;
          const a = 0.22 + 0.78 * (0.5 + 0.5 * Math.sin(t * 0.001 * s.speed * 1000 + s.phase));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(251,207,232,${a * 0.62})`;
          ctx.fill();
        });
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    }

    /* ══════════════════════════════════════════════════════════
       STAGE 2  —  ENVELOPE
    ══════════════════════════════════════════════════════════ */
    function startStage2() {
      document.getElementById('meshBg').classList.add('on');
      document.getElementById('starCanvas').classList.add('on');
      initStars();
      showStage('s2', 1000);

      const wrap = document.getElementById('envWrap');
      const heart = document.getElementById('envHeart');
      let opened = false;

      function openEnv() {
        if (opened) return;
        opened = true;
        haptic([10, 30, 20, 30, 10]);
        sfxR.currentTime = 0;
        sfxR.play().catch(() => { });
        startVizDraw();
        crossFade();

        gsap.to('#envSvgWrap', { rotationX: 14, y: -22, duration: 0.48, ease: 'power2.out' });
        gsap.to('#envSvgWrap', { scale: 0.65, opacity: 0, y: -90, duration: 0.85, delay: 0.46, ease: 'power3.in' });
        gsap.to('#envHeart', { y: -70, opacity: 0, scale: 0.45, duration: 0.58, delay: 0.28 });
        gsap.to('.env-hint', { opacity: 0, duration: 0.28 });

        const rect = document.getElementById('envSvgWrap').getBoundingClientRect();
        confetti({
          particleCount: 65, spread: 95,
          origin: { x: (rect.left + rect.width / 2) / window.innerWidth, y: (rect.top + rect.height / 2) / window.innerHeight },
          colors: ['#ff007f', '#fbcfe8', '#e879f9', '#fafafa'], scalar: 0.72, gravity: 1.55,
        });

        setTimeout(() => hideStage('s2', 560).then(startStage3), 960);
      }

      wrap.addEventListener('click', openEnv, { once: true });
      heart.addEventListener('click', openEnv, { once: true });
    }

    /* ══════════════════════════════════════════════════════════
       STAGE 3  —  LOVE SLIDER
    ══════════════════════════════════════════════════════════ */
    let _hp = [];
    let _lastSl = 0;
    let _s3done = false;

    const SUBMAP = [
      { at: 20, t: 'Bu qədər az? 🥺' },
      { at: 50, t: 'Bir az da artır... 🚀' },
      { at: 100, t: 'Elə bu qədər? 🔥' },
      { at: 500, t: 'Daha çox!!! ❤️' },
      { at: 1000, t: 'Sonsuza qədər! ♾️' },
    ];
    function getSub(v) { let r = 'Sürüşdür... 💫'; for (const s of SUBMAP) if (v >= s.at) r = s.t; return r; }

    function startStage3() {
      _hp = []; _lastSl = 0; _s3done = false;
      showStage('s3', 800);

      // Particle canvas inside card
      const card = document.getElementById('slCard');
      const hcv = document.getElementById('hCanvas');
      hcv.width = card.offsetWidth;
      hcv.height = card.offsetHeight;
      const hctx = hcv.getContext('2d');
      const hloop = () => {
        hctx.clearRect(0, 0, hcv.width, hcv.height);
        _hp = _hp.filter(p => p.life > 0);
        _hp.forEach(p => {
          p.x += p.vx; p.y += p.vy; p.vy -= 0.11; p.life -= 2.4;
          hctx.save();
          hctx.globalAlpha = (p.life / 100) * 0.78;
          hctx.font = `${p.sz}px serif`;
          hctx.fillText(p.ch, p.x, p.y);
          hctx.restore();
        });
        requestAnimationFrame(hloop);
      };
      hloop();

      const sl = document.getElementById('slRange');
      sl.addEventListener('input', onSlider);
      sl.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
    }

    function onSlider(e) {
      if (_s3done) return;
      const v = +e.target.value;
      document.getElementById('slNum').textContent = v;
      const pct = (v / 1000) * 100;
      e.target.style.setProperty('--fill', pct + '%');

      const sub = document.getElementById('slSub');
      const nt = getSub(v);
      if (sub.textContent !== nt) {
        gsap.to(sub, {
          opacity: 0, duration: 0.18,
          onComplete: () => { sub.textContent = nt; gsap.to(sub, { opacity: 1, duration: 0.28 }); }
        });
      }

      if (v > _lastSl) spawnHP(v, e.target);
      _lastSl = v;

      const g = 0.68 + (v / 1000) * 0.62;
      document.querySelector('.sl-num').style.textShadow =
        `0 0 ${22 * g}px rgba(255,0,127,${g}),0 0 ${55 * g}px rgba(255,0,127,${g * .58}),0 0 ${96 * g}px rgba(236,72,153,${g * .32})`;

      if (v === 1000 && !_s3done) {
        _s3done = true;
        haptic([30, 60, 30, 60, 80]);
        sfxC.currentTime = 0;
        sfxC.play().catch(() => { });
        // Confetti burst
        const fc = o => confetti({ ...o, colors: ['#ff007f', '#fbcfe8', '#c084fc', '#fafafa', '#ffd700'], disableForReducedMotion: true });
        fc({ particleCount: 130, spread: 105, origin: { y: 0.5 }, scalar: 1.12 });
        setTimeout(() => fc({ particleCount: 85, spread: 82, angle: 58, origin: { x: 0, y: 0.58 } }), 240);
        setTimeout(() => fc({ particleCount: 85, spread: 82, angle: 122, origin: { x: 1, y: 0.58 } }), 390);
        setTimeout(() => {
          gsap.to('#slCard', {
            opacity: 0, scale: 0.9, duration: 0.88, ease: 'power3.in',
            onComplete: () => { document.getElementById('s3').remove(); startStage4(); }
          });
        }, 2100);
      }
    }

    function spawnHP(v, sl) {
      const slR = sl.getBoundingClientRect();
      const cR = document.getElementById('slCard').getBoundingClientRect();
      const pct = v / 1000;
      const tx = slR.left - cR.left + pct * slR.width;
      const ty = slR.top - cR.top;
      const n = Math.floor(1 + v / 190);
      const chs = ['❤️', '💗', '💖', '✨', '💫', '⭐'];
      for (let i = 0; i < n; i++) {
        _hp.push({
          x: tx + rndPm(18), y: ty, vx: rndPm(2), vy: -(1.4 + rnd(2.6)),
          life: 78 + rnd(42), sz: 10 + rnd(13), ch: chs[Math.floor(rnd(chs.length))]
        });
      }
    }

    /* ══════════════════════════════════════════════════════════
       STAGE 4  —  CINEMATIC TYPOGRAPHY SLIDES
    ══════════════════════════════════════════════════════════ */
    const SLIDES = [
      'Gözlərindəki işığın və qəlbindəki sevginin heç vaxt     sönmədiyi, birlikdə qeyd edəcəyimiz neçə belə gözəl     illərimiz olsun.',
      'Sən mənim bu dünyadakı səs-küyün içində tapdığım ən gözəl sükutsan.',
    ];

    function startStage4() {
      showStage('s4', 900).then(() => {
        gsap.to('#slideGlass', { y: -6, duration: 3.4, repeat: -1, yoyo: true, ease: 'sine.inOut' });
        runSlide(0);
      });
    }

    function splitChars(text) {
      const el = document.getElementById('slideInner');
      el.innerHTML = '';
      [...text].forEach(ch => {
        if (ch === ' ') {
          const sp = document.createElement('span');
          sp.innerHTML = '&nbsp;'; sp.style.display = 'inline-block';
          el.appendChild(sp);
        } else {
          const s = document.createElement('span');
          s.className = 'ch'; s.textContent = ch;
          el.appendChild(s);
        }
      });
      return el.querySelectorAll('.ch');
    }

    function runSlide(idx) {
      if (idx >= SLIDES.length) { hideStage('s4', 900).then(startStage5); return; }
      const chars = splitChars(SLIDES[idx]);

      // Letter-by-letter blur reveal
      gsap.fromTo(chars,
        { opacity: 0, filter: 'blur(12px)', y: 20 },
        {
          opacity: 1, filter: 'blur(0px)', y: 0,
          duration: 0.95, ease: 'power2.out',
          stagger: { amount: SLIDES[idx].length * 0.038 + 0.6, from: 'start' }
        });

      const holdMs = SLIDES[idx].length * 40 + 3400;

      // Light leak flash between slide 0 → slide 1
      if (idx === 0) {
        setTimeout(() => {
          gsap.timeline()
            .to('#lightLeak', { opacity: 1, duration: 0.52, ease: 'power2.out' })
            .to('#lightLeak', { opacity: 0, duration: 0.85, ease: 'power2.in' });
        }, holdMs);
      }

      // Blur dissolve out
      setTimeout(() => {
        gsap.to(chars, {
          opacity: 0, filter: 'blur(10px)', y: -12,
          duration: 0.88, ease: 'power2.in',
          stagger: { amount: 0.55, from: 'start' },
          onComplete: () => runSlide(idx + 1),
        });
      }, holdMs + 200);
    }

    /* ══════════════════════════════════════════════════════════
       STAGE 5  —  DYNAMIC WORD CLOUD HEART
    
       FIX (mobile clip):  heartScale now clamps to stay within
         safe viewport margins; extra per-point viewport guard.
    
       FIX (GSAP race):    gsap.killTweensOf(el, true) resets
         position immediately; then left/top/x/y all set to
         final in a single tween — no residual drift.
    
       Anti-collision:     offscreen canvas measureText() gives
         pixel-accurate word widths; PAD = 8px hard buffer.
    ══════════════════════════════════════════════════════════ */
    const WORDS = ['Xoşbəxtliyim', 'Gözəlim', 'Çiçəyim', 'Balım', 'Canım', 'Həyatım', 'Gülüm', 'Ömrüm'];
    const CENTER = 'Gülayım';

    function heartPt(t) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
      return { x, y };
    }

    function startStage5() {
      haptic([20, 40, 20]);
      showStage('s5', 950);
      buildWordHeart();
    }

    function buildWordHeart() {
      const container = document.getElementById('wcc');
      container.innerHTML = '';

      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const cx = vw / 2;
      const cy = vh * 0.47;

      // ── FIX: tighter clamp so heart never clips on small phones ──
      const heartScale = clamp(12, Math.min(vw, vh) * 0.0225, 35);
      // Font scaled to heart — small enough that words pack cleanly
      const fs = clamp(8.5, vw * 0.016, 13.5);

      // Accurate word-width measurement
      const offcv = document.createElement('canvas');
      const octx = offcv.getContext('2d');
      octx.font = `800 ${fs}px Montserrat,sans-serif`;

      // Sample heart curve densely
      const SAMPLES = 700;
      const rawPts = [];
      for (let i = 0; i < SAMPLES; i++) {
        const t = (i / SAMPLES) * Math.PI * 2;
        const p = heartPt(t);
        const px = cx + p.x * heartScale;
        const py = cy + p.y * heartScale;
        // ── FIX: skip points within margin of viewport edge ──
        const M = fs * 3.5;
        if (px > M && px < vw - M && py > M && py < vh - M) {
          rawPts.push({ x: px, y: py });
        }
      }
      // Shuffle for organic placement
      rawPts.sort(() => Math.random() - 0.5);

      const placed = [];
      const rects = [];
      const CG = heartScale * 1.12;   // centre guard radius
      const MAX_WORDS = 40;
      const PAD = 8;

      for (let pi = 0; pi < rawPts.length; pi++) {
        if (placed.length >= MAX_WORDS) break;
        const pt = rawPts[pi];
        const dcx = pt.x - cx, dcy = pt.y - cy;
        if (Math.sqrt(dcx * dcx + dcy * dcy) < CG) continue;

        const word = WORDS[placed.length % WORDS.length];
        const tw = octx.measureText(word).width;
        const th = fs * 1.2;
        const rx = pt.x - tw / 2, ry = pt.y - th / 2;

        // Collision check
        let hit = false;
        for (const r of rects) {
          if (rx < r.x + r.w + PAD && rx + tw + PAD > r.x &&
            ry < r.y + r.h + PAD && ry + th + PAD > r.y) { hit = true; break; }
        }
        if (hit) continue;
        rects.push({ x: rx, y: ry, w: tw, h: th });

        const el = document.createElement('div');
        el.className = 'cw';
        el.textContent = word;
        el.style.fontSize = fs + 'px';
        el.style.color = ['#fbcfe8', '#f9a8d4', '#e879f9', '#fafafa', '#c084fc'][placed.length % 5];
        el.style.textShadow = '0 0 7px rgba(255,0,127,.3),0 0 16px rgba(255,0,127,.15)';
        // Phase-1 scatter start
        el.style.left = (cx + rndPm(vw * 0.78)) + 'px';
        el.style.top = (cy + rndPm(vh * 0.72)) + 'px';
        el.style.opacity = '0.13';
        el.style.transform = `translate(-50%,-50%) rotate(${rndPm(8)}deg)`;
        container.appendChild(el);
        placed.push({ el, tx: pt.x, ty: pt.y });
      }

      // Centre glow orb
      const orbSz = heartScale * 5.2;
      const orb = document.createElement('div');
      orb.className = 'center-orb';
      orb.style.cssText = `left:${cx}px;top:${cy}px;width:${orbSz}px;height:${orbSz}px;opacity:0;`;
      container.appendChild(orb);

      // Centre word
      const cEl = document.createElement('div');
      cEl.className = 'cw center';
      cEl.textContent = CENTER;
      cEl.style.fontSize = clamp(19, vw * 0.05, 38) + 'px';
      cEl.style.left = cx + 'px';
      cEl.style.top = cy + 'px';
      cEl.style.opacity = '0';
      container.appendChild(cEl);

      // ── PHASE 1: ambient cosmic drift (3.5 s) ──
      placed.forEach(({ el }) => {
        gsap.to(el, {
          x: rndPm(26), y: rndPm(16), rotation: rndPm(5),
          duration: 2.4 + rnd(1.4), repeat: -1, yoyo: true, ease: 'sine.inOut',
        });
      });

      // ── PHASE 2: magnetic convergence ──
      // FIX: killTweensOf with immediate=true then animate
      // x/y/left/top/rotation all in one tween → no residual offset
      setTimeout(() => {
        placed.forEach(({ el, tx, ty }, i) => {
          gsap.killTweensOf(el);            // stop drift immediately
          gsap.set(el, { x: 0, y: 0 });    // clear any GSAP x/y offset
          gsap.to(el, {
            left: tx + 'px', top: ty + 'px',
            x: 0, y: 0, rotation: 0,
            opacity: 0.9,
            duration: 1.65 + rnd(0.65),
            delay: rnd(0.5),
            ease: 'power3.out',
            onComplete() {
              // Gentle float after landing
              gsap.to(el, {
                y: rndPm(4), duration: 2 + rnd(1.8),
                repeat: -1, yoyo: true, ease: 'sine.inOut', delay: rnd(1.2),
              });
            },
          });
        });

        gsap.to(orb, { opacity: 1, duration: 1.5, delay: 0.9, ease: 'power2.out' });
        gsap.to(cEl, { opacity: 1, duration: 1.7, delay: 1.25, ease: 'power2.out' });
      }, 3500);
    }
  </script>
</body>
